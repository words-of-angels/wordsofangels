<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words of Angels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&family=Great+Vibes&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .poem-font { font-family: 'Playfair Display', serif; }
        .script-font { font-family: 'Great+Vibes', cursive; }
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('https://picsum.photos/id/1015/2000/1200') center/cover fixed;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100">

<nav class="bg-white/95 dark:bg-gray-900/95 backdrop-blur border-b sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <div onclick="navigateTo('profile')" class="flex items-center gap-3 cursor-pointer">
            <i class="fa-solid fa-feather text-3xl text-amber-600"></i>
            <h1 class="text-3xl font-bold script-font">Words of Angels</h1>
        </div>
        <div class="flex items-center gap-6">
            <button onclick="navigateTo('feed')" class="hover:text-amber-600">Discover</button>
            <button onclick="navigateTo('post')" class="hover:text-amber-600">Write</button>
            <button onclick="navigateTo('leaderboard')" class="hover:text-amber-600">Leaderboard</button>
            <button onclick="navigateTo('profile')" class="hover:text-amber-600">Profile</button>
            <button onclick="toggleTheme()" class="text-2xl">🌗</button>
            <button onclick="showSubscribe()" class="bg-amber-700 text-white px-5 py-2 rounded-full text-sm font-medium">Subscribe $9/mo</button>
        </div>
    </div>
</nav>

<!-- Hero -->
<div class="hero-bg h-screen flex items-center justify-center text-white text-center">
    <div class="max-w-3xl px-6">
        <h1 class="text-7xl md:text-8xl script-font tracking-wider">Words of Angels</h1>
        <p class="text-2xl poem-font mt-4">Speak. Write. Be heard.</p>
        <button onclick="navigateTo('post')" class="mt-12 px-12 py-5 bg-white text-amber-900 rounded-3xl text-xl font-semibold">Start Writing</button>
    </div>
</div>

<div class="max-w-5xl mx-auto px-6 py-12">

    <!-- WRITE POEM -->
    <div id="post-page">
        <h2 class="text-4xl poem-font mb-8">Write Your Poem</h2>
        <div class="flex gap-4 mb-4">
            <select id="font-select" class="px-5 py-3 border rounded-2xl">
                <option value="poem-font">Classic</option>
                <option value="script-font">Cursive</option>
            </select>
            <button onclick="startVoiceInput()" class="px-6 py-3 border rounded-2xl flex items-center gap-2">
                🎤 Speak
            </button>
        </div>
        <input id="title" placeholder="Poem Title" class="w-full px-6 py-4 text-xl border rounded-3xl mb-6">
        <textarea id="content" rows="12" placeholder="Write or speak your poem..." class="w-full px-6 py-5 text-lg border rounded-3xl"></textarea>
        
        <div class="flex gap-4 mt-8">
            <button onclick="savePrivate()" class="flex-1 py-5 border rounded-3xl">💾 Save Private</button>
            <button onclick="publishPoem()" class="flex-1 py-5 bg-amber-700 text-white rounded-3xl">🌍 Publish Publicly</button>
        </div>
    </div>

    <!-- FEED -->
    <div id="feed-page" class="hidden">
        <input id="search-input" placeholder="Search poems..." class="w-full px-6 py-4 rounded-3xl border mb-8">
        <div id="feed" class="space-y-8"></div>
    </div>

    <!-- PROFILE -->
    <div id="profile-page" class="hidden">
        <h1 class="text-5xl poem-font">Alex Rivera</h1>
        <p class="text-amber-600">@creator</p>
        <div id="private-list" class="mt-10 space-y-8"></div>
    </div>

    <!-- LEADERBOARD -->
    <div id="leaderboard-page" class="hidden">
        <h2 class="text-4xl poem-font mb-8">🏆 Leaderboard</h2>
        <div id="leaderboard" class="space-y-6"></div>
    </div>
</div>

<script>
    let publicPoems = JSON.parse(localStorage.getItem('publicPoems')) || [];
    let privatePoems = JSON.parse(localStorage.getItem('privatePoems')) || [];

    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
    }

    function navigateTo(page) {
        document.querySelectorAll('div[id$="-page"]').forEach(el => el.classList.add('hidden'));
        document.getElementById(page + '-page').classList.remove('hidden');
        if (page === 'feed') renderFeed();
        if (page === 'profile') renderPrivate();
        if (page === 'leaderboard') renderLeaderboard();
    }

    function publishPoem() {
        const title = document.getElementById('title').value.trim();
        const content = document.getElementById('content').value.trim();
        if (!title || !content) return alert("Please write a title and poem");

        publicPoems.unshift({id: Date.now(), title, content, author: "Alex Rivera", likes: 0});
        localStorage.setItem('publicPoems', JSON.stringify(publicPoems));
        alert("✅ Poem published successfully!");
        document.getElementById('title').value = '';
        document.getElementById('content').value = '';
        navigateTo('feed');
    }

    function savePrivate() {
        const title = document.getElementById('title').value.trim();
        const content = document.getElementById('content').value.trim();
        if (!title || !content) return alert("Please write something");

        privatePoems.unshift({title, content});
        localStorage.setItem('privatePoems', JSON.stringify(privatePoems));
        alert("💾 Saved to Private Profile");
        navigateTo('profile');
    }

    function renderFeed() {
        const container = document.getElementById('feed');
        container.innerHTML = publicPoems.map(p => `
            <div class="bg-white dark:bg-gray-800 rounded-3xl p-8">
                <h3 class="text-2xl poem-font">${p.title}</h3>
                <p class="text-amber-600">by ${p.author}</p>
                <p class="mt-6">${p.content}</p>
                <div class="mt-6 flex gap-6">
                    <button onclick="tipPoet()" class="text-amber-600">💰 Tip Poet</button>
                    <button onclick="readPoem('${p.content.replace(/'/g, "\\'")}')" class="text-amber-600">🔊 Read Aloud</button>
                </div>
            </div>
        `).join('');
    }

    function renderPrivate() {
        const container = document.getElementById('private-list');
        container.innerHTML = privatePoems.map(p => `
            <div class="bg-white dark:bg-gray-800 p-8 rounded-3xl">
                <h4 class="font-semibold">${p.title}</h4>
                <p class="mt-4">${p.content}</p>
            </div>
        `).join('');
    }

    function renderLeaderboard() {
        document.getElementById('leaderboard').innerHTML = `<p class="text-center py-12 text-2xl">🏆 Poet of the Month voting coming soon...</p>`;
    }

    function tipPoet() {
        window.open('https://paypal.me/wordsofangels', '_blank');
    }

    function showSubscribe() {
        alert("7-day Free Trial activated! (Demo)\n\nFull subscription coming soon.");
    }

    function startVoiceInput() {
        if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
            return alert("Voice input not supported in this browser. Try Chrome.");
        }
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.onresult = (event) => {
            document.getElementById('content').value += event.results[0][0].transcript + " ";
        };
        recognition.start();
        alert("🎤 Speak now... Your words will appear in the poem box.");
    }

    function readPoem(text) {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9;
            speechSynthesis.speak(utterance);
        } else {
            alert("Text-to-speech not supported in this browser.");
        }
    }

    window.onload = () => navigateTo('profile');
</script>
</body>
  </html>
